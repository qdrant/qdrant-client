name: Integration tests

on:
  push:
    branches: [ master ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  release-package-sanity:
    runs-on: ubuntu-latest

    name: Release package sanity test

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10.x'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip poetry
      - name: Build package
        run: |
          poetry build
      - name: Check installed release package
        run: |
          python -m venv .release-smoke
          . .release-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/qdrant_client-*.whl
          python tools/check_release_package.py dist/qdrant_client-*.whl
        shell: bash

  test:

    strategy:
      matrix:
        python-version:
          - '3.10.x'
          - '3.11.x'
          - '3.12.x'
          - '3.13.x'
        os:
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    name: Python ${{ matrix.python-version }} on ${{ matrix.os }} test

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install jq
        uses: dcarbone/install-jq-action@v3.2.0
      - name: Install dependencies
        run: |
          python -m pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi --all-extras
      - name: Run async client generation tests
        run: |
          if [[ ${{ matrix.python-version }} == "3.10.x" ]]; then
            ./tests/async-client-consistency-check.sh
          fi
        shell: bash
      - name: Run inspection cache population tests
        run: |
          if [[ ${{ matrix.python-version }} == "3.10.x" ]]; then
            ./tests/inspection-cache-consistency-check.sh
          fi
        shell: bash
      - name: Check conversion coverage
        run: |
          ./tests/coverage-test.sh
        shell: bash
      - name: Run Python doc tests
        run: |
          python -m doctest qdrant_client/local/local_collection.py
      - name: Run integration tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ./tests/integration-tests.sh
        shell: bash
      - name: Backward compatibility integration tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          QDRANT_VERSION='v1.16.3' ./tests/integration-tests.sh
        shell: bash
      - name: Upload failed snapshot if tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed_snapshot
          path: failed_snapshot.snapshot
          retention-days: 10
